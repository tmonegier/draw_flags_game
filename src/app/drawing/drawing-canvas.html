<div class="canvas-wrapper"
     [style.aspect-ratio]="canvasWidth() + '/' + canvasHeight"
     [style.max-width.px]="canvasWidth()">
  <!-- Base canvas: permanent drawings (exported on submit) -->
  <canvas
    #baseCanvas
    [width]="canvasWidth()"
    [height]="canvasHeight"
    class="base-canvas"
  ></canvas>

  <!-- Splits canvas: guide lines only — NOT included in submission -->
  <canvas
    #splitsCanvas
    [width]="canvasWidth()"
    [height]="canvasHeight"
    class="splits-canvas"
  ></canvas>

  <!-- Overlay canvas: shape preview + event capture -->
  <canvas
    #overlayCanvas
    [width]="canvasWidth()"
    [height]="canvasHeight"
    class="overlay-canvas"
    [class.eraser-cursor]="tool() === 'eraser' && !isPlacingElement()"
    [class.crosshair-cursor]="tool() === 'fill' && !isPlacingElement()"
    [class.placement-cursor]="isPlacingElement()"
    (mousedown)="onMouseDown($event)"
    (mousemove)="onMouseMove($event)"
    (mouseup)="onMouseUp($event)"
    (mouseleave)="onMouseLeave()"
    (contextmenu)="$event.preventDefault()"
  ></canvas>
</div>
