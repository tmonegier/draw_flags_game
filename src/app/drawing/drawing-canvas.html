<div class="canvas-wrapper"
     [style.aspect-ratio]="canvasWidth() + '/' + canvasHeight"
     [style.max-width.px]="canvasWidth()">
  <!-- Base canvas: permanent drawings (exported on submit) -->
  <canvas
    #baseCanvas
    [width]="canvasWidth()"
    [height]="canvasHeight"
    class="base-canvas"
  ></canvas>

  <!-- Splits canvas: guide lines only — NOT included in submission -->
  <canvas
    #splitsCanvas
    [width]="canvasWidth()"
    [height]="canvasHeight"
    class="splits-canvas"
  ></canvas>

  <!-- Elements canvas: SVG stamps above the fill layer — included in submission -->
  <canvas
    #elementsCanvas
    [width]="canvasWidth()"
    [height]="canvasHeight"
    class="elements-canvas"
  ></canvas>

  <!-- Overlay canvas: shape preview + event capture -->
  <canvas
    #overlayCanvas
    [width]="canvasWidth()"
    [height]="canvasHeight"
    class="overlay-canvas"
    [class.placement-cursor]="isPlacingElement()"
    [class.pen-cursor]="drawingMode() === 'pen'"
    (mousedown)="onMouseDown($event)"
    (mousemove)="onMouseMove($event)"
    (contextmenu)="$event.preventDefault()"
  ></canvas>
</div>
