<div class="toolbar">
  <!-- Color picker or restricted palette -->
  @if (allowedColors(); as palette) {
    <div class="color-palette">
      @for (c of palette; track c) {
        <button
          class="palette-swatch"
          [class.active]="activeColor() === c"
          [style.background]="c"
          [title]="c"
          (click)="colorChange.emit(c)"
        ></button>
      }
    </div>
  } @else {
    <div class="color-picker-wrapper" title="Pick a color">
      <div class="color-picker-swatch" [style.background]="activeColor()"></div>
      <input
        type="color"
        class="color-picker-input"
        [value]="activeColor()"
        (input)="onColorInput($event)"
      />
    </div>
  }

  <!-- Pen size slider (free mode only) -->
  @if (showPenSize()) {
    <div class="pen-size-control">
      <input
        type="range"
        class="pen-size-slider"
        min="1"
        max="30"
        [value]="penSize()"
        (input)="onPenSizeInput($event)"
        [title]="'Pen size: ' + penSize() + 'px'"
      />
      <div class="pen-size-preview" [style.width.px]="penSize() * 2" [style.height.px]="penSize() * 2"></div>
    </div>
  }

  <div class="divider"></div>

  <!-- Ratio picker (create mode only) -->
  @if (ratioOptions().length > 0) {
    <select
      class="ratio-select"
      title="Flag ratio"
      aria-label="Flag ratio"
      [value]="ratio()"
      (change)="onRatioInput($event)"
    >
      @for (opt of ratioOptions(); track opt) {
        <option [value]="opt">{{ opt }}</option>
      }
    </select>
  }

  <!-- Elements library (hard mode only) -->
  @if (showElements()) {
    <button class="elements-btn" title="Flag elements library" (click)="openElements.emit()">⭐ Elements</button>
  }

  <!-- Clear / Cancel Changes -->
  <button class="clear-btn" [title]="clearLabel()" (click)="onClear()">{{ clearLabel() }}</button>
</div>
