<div class="toolbar">
  <!-- Drawing tools -->
  <div class="tool-group">
    @for (t of tools; track t.key) {
      <button
        class="tool-btn"
        [class.active]="activeTool() === t.key"
        [title]="t.title"
        (click)="selectTool(t.key)"
      >{{ t.icon }}</button>
    }
  </div>

  <div class="divider"></div>

  <!-- Color picker or restricted palette -->
  @if (allowedColors(); as palette) {
    <div class="color-palette">
      @for (c of palette; track c) {
        <button
          class="palette-swatch"
          [class.active]="activeColor() === c"
          [style.background]="c"
          [title]="c"
          (click)="colorChange.emit(c)"
        ></button>
      }
    </div>
  } @else {
    <div class="color-picker-wrapper" title="Pick a color">
      <div class="color-picker-swatch" [style.background]="activeColor()"></div>
      <input
        type="color"
        class="color-picker-input"
        [value]="activeColor()"
        (input)="onColorInput($event)"
      />
    </div>
  }

  <div class="divider"></div>

  <!-- Elements library -->
  <button class="elements-btn" title="Flag elements library" (click)="openElements.emit()">⭐ Elements</button>

  <!-- Clear -->
  <button class="clear-btn" title="Clear canvas" (click)="onClear()">🗑️ Clear</button>
</div>
