<div class="compare-screen">

  <div class="compare-header">
    <h2>{{ currentCountry?.name }}</h2>
    @if (isScoring()) {
      <div class="scoring-badge computing">Scoring…</div>
    } @else {
      <div class="scoring-badge" [class]="'grade-' + grade().toLowerCase()">
        <span class="score-number">{{ score() }}<small>/1000</small></span>
        <span class="grade-letter">{{ grade() }}</span>
      </div>
    }
  </div>

  <div class="panels">
    <div class="panel">
      <span class="panel-label">Your Drawing</span>
      <div class="flag-frame" [style.aspect-ratio]="flagAspectRatio">
        @if (userDrawing) {
          <img [src]="userDrawing" alt="Your drawing" class="flag-img" />
        }
      </div>
    </div>

    <div class="vs-divider">VS</div>

    <div class="panel">
      <span class="panel-label">Real Flag</span>
      <div class="flag-frame" [style.aspect-ratio]="flagAspectRatio">
        <img [src]="flagUrl" alt="Real flag" class="flag-img" />
      </div>
    </div>
  </div>

  @if (!isScoring()) {
    <p class="score-description">{{ getScoreMessage() }}</p>
  }

  <div class="actions">
    @if (hasMore) {
      <button class="btn btn-primary" (click)="next()">
        Next Country →
      </button>
    } @else {
      <button class="btn btn-primary" (click)="next()">
        🏆 See Results
      </button>
    }
    <button class="btn btn-secondary" (click)="goHome()">🏠 Home</button>
  </div>
</div>
