<div class="end-screen">
  <div class="trophy">🏆</div>
  <h1>Game Over!</h1>

  <div class="overall-score">
    <span class="avg-label">Overall Score</span>
    <div class="avg-badge" [style.border-color]="gameState.overallGrade() | gradeColor" [style.color]="gameState.overallGrade() | gradeColor">
      <span class="avg-number">{{ gameState.averageScore() }}<small>/1000</small></span>
      <span class="avg-grade">{{ gameState.overallGrade() }}</span>
    </div>
  </div>

  <div class="cards">
    @for (round of gameState.roundScores(); track round.country.code; let i = $index) {
      <div class="card">
        <div class="card-header">
          <span class="card-index">{{ i + 1 }}</span>
          <span class="card-country">{{ round.country.name }}</span>
          <span class="card-grade" [style.color]="round.grade | gradeColor">{{ round.grade }}</span>
          <span class="card-score">{{ round.score }} / 1000</span>
        </div>
        <div class="card-flags">
          <div class="flag-slot">
            <span class="flag-slot-label">Your drawing</span>
            <div class="flag-frame" [style.aspect-ratio]="round.country.ratio | aspectRatio">
              <img [src]="round.drawingDataUrl" [alt]="round.country.name" class="flag-img" />
            </div>
          </div>
          <div class="flag-slot">
            <span class="flag-slot-label">Real flag</span>
            <div class="flag-frame" [style.aspect-ratio]="round.country.ratio | aspectRatio">
              <img [src]="round.country.svgFile | flagUrl" [alt]="round.country.name" class="flag-img" />
            </div>
          </div>
        </div>
      </div>
    }
  </div>

  <button class="play-again-btn" (click)="playAgain()">
    🔄 Play Again
  </button>
</div>
