<div class="home">
  <div class="hero">
    <svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-label="Flag Drawing Game logo">
      <!-- Flagpole -->
      <line x1="14" y1="8" x2="14" y2="83" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="14" cy="83" r="2.5" fill="#64748b"/>
      <!-- Flag bands (red / white / blue tricolor) -->
      <rect x="14" y="10" width="44" height="12" fill="#e53e3e"/>
      <rect x="14" y="22" width="44" height="12" fill="#f0f0f0"/>
      <rect x="14" y="34" width="44" height="12" fill="#3b82f6"/>
      <!-- Dashed bottom edge — the line being drawn right now -->
      <line x1="14" y1="46" x2="58" y2="46" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-dasharray="4,3"/>
      <!-- Pencil: tip touching the bottom-right corner of the flag, body extending lower-right -->
      <g transform="translate(58,46) rotate(45)">
        <!-- Wooden tip cone -->
        <polygon points="0,0 9,-3 9,3" fill="#d97706"/>
        <!-- Graphite tip -->
        <polygon points="0,0 5,-1.5 5,1.5" fill="#1e293b"/>
        <!-- Pencil body -->
        <rect x="9" y="-3" width="18" height="6" fill="#fbbf24"/>
        <!-- Ferrule -->
        <rect x="27" y="-3" width="3" height="6" fill="#94a3b8"/>
        <!-- Eraser -->
        <rect x="30" y="-3" width="6" height="6" fill="#f87171" rx="1.5"/>
      </g>
    </svg>
    <h1>Flag Drawing Game</h1>
    <p class="subtitle">Test your vexillology skills! Draw country flags from memory.</p>
  </div>

  <div class="difficulty-section">
    <h2>Choose Difficulty</h2>
    <div class="cards">
      @for (d of difficulties; track d.key) {
        <button
          class="card"
          [class.selected]="selected() === d.key"
          (click)="select(d.key)"
        >
          <span class="card-emoji">{{ d.emoji }}</span>
          <span class="card-label">{{ d.label }}</span>
          <span class="card-desc">{{ d.description }}</span>
        </button>
      }
    </div>
  </div>

  <button class="start-btn" (click)="startGame()">
    🚩 Start Drawing!
  </button>
</div>

<app-tutorial-modal
  [difficulty]="selected()"
  [isOpen]="showTutorial()"
  (closed)="onTutorialClosed()"
/>
